<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI News Dashboard</title>
  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --card2: #243044;
      --border: #334155; --text: #e2e8f0; --muted: #94a3b8;
      --accent: #3b82f6; --green: #22c55e; --yellow: #eab308;
      --red: #ef4444; --orange: #f97316; --purple: #a855f7;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
    .container { max-width:1400px; margin:0 auto; padding:16px 20px; }

    header { display:flex; justify-content:space-between; align-items:center; padding:14px 0 18px; border-bottom:1px solid var(--border); margin-bottom:20px; }
    header h1 { font-size:1.35rem; font-weight:700; }
    header h1 span { color:var(--accent); }
    .header-right { display:flex; align-items:center; gap:10px; }
    .updated { color:var(--muted); font-size:0.78rem; }
    .btn { background:var(--accent); color:#fff; border:none; padding:5px 14px; border-radius:6px; cursor:pointer; font-size:0.82rem; }
    .btn:hover { opacity:.85; }

    /* Page tabs */
    .page-tabs { display:flex; gap:0; margin-bottom:20px; border-bottom:2px solid var(--border); }
    .ptab { background:none; border:none; color:var(--muted); padding:10px 20px; font-size:0.9rem; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s; }
    .ptab:hover { color:var(--text); }
    .ptab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }

    /* Page sections */
    .page { display:none; }
    .page.active { display:block; }

    /* Stats */
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px; }
    .stat { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
    .stat .lbl { color:var(--muted); font-size:0.7rem; text-transform:uppercase; letter-spacing:.05em; }
    .stat .val { font-size:1.9rem; font-weight:800; color:var(--accent); line-height:1.1; }
    .stat .sub { color:var(--muted); font-size:0.75rem; }

    /* Grid */
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    .row3 { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:16px; }
    @media(max-width:860px){.stats{grid-template-columns:1fr 1fr;}.row2,.row3{grid-template-columns:1fr;}}

    /* Card */
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px 18px; }
    .card-title { font-size:0.92rem; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:7px; }

    /* Topic list */
    .topics { list-style:none; }
    .topics li { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:0.85rem; }
    .topics li:last-child { border-bottom:none; }
    .t-score { background:rgba(59,130,246,.15); color:var(--accent); padding:1px 8px; border-radius:10px; font-size:0.7rem; font-weight:600; }

    /* Article list (compact) */
    .arts { list-style:none; }
    .arts li { padding:8px 0; border-bottom:1px solid var(--border); }
    .arts li:last-child { border-bottom:none; }
    .art-title { font-size:0.85rem; font-weight:500; }
    .art-title a { color:var(--text); text-decoration:none; }
    .art-title a:hover { color:var(--accent); }
    .art-meta { color:var(--muted); font-size:0.73rem; margin-top:2px; }
    .art-summary { color:#94a3b8; font-size:0.78rem; margin-top:3px; line-height:1.4; }
    .sdot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; vertical-align:middle; }

    /* Category page */
    .cat-tabs { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
    .ctab { background:var(--border); color:var(--muted); border:none; padding:4px 12px; border-radius:16px; font-size:0.75rem; cursor:pointer; transition:all .2s; }
    .ctab.active { background:var(--accent); color:#fff; }
    .ctab:hover:not(.active) { background:var(--card2); color:var(--text); }
    .cat-articles { list-style:none; }
    .cat-article { padding:12px 0; border-bottom:1px solid var(--border); }
    .cat-article:last-child { border-bottom:none; }
    .ca-header { display:flex; align-items:flex-start; gap:10px; }
    .ca-score { min-width:38px; text-align:center; background:rgba(59,130,246,.12); color:var(--accent); border-radius:6px; padding:2px 6px; font-size:0.72rem; font-weight:700; }
    .ca-title { font-size:0.88rem; font-weight:500; }
    .ca-title a { color:var(--text); text-decoration:none; }
    .ca-title a:hover { color:var(--accent); }
    .ca-meta { color:var(--muted); font-size:0.72rem; margin-top:3px; }
    .ca-summary { margin-top:5px; font-size:0.82rem; color:#94a3b8; line-height:1.5; }
    .ca-point { display:inline-block; background:rgba(168,85,247,.15); color:#d8b4fe; font-size:0.72rem; padding:1px 8px; border-radius:8px; margin-bottom:4px; }

    /* Drafts */
    .draft-tabs { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
    .dtab { background:var(--border); color:var(--muted); border:none; padding:4px 12px; border-radius:16px; font-size:0.75rem; cursor:pointer; transition:all .2s; }
    .dtab.active { background:var(--accent); color:#fff; }
    .dtab:hover:not(.active) { background:var(--card2); color:var(--text); }
    .draft-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:10px; }
    .dcard { background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:12px; border-left:3px solid var(--accent); }
    .dcard:hover { background:rgba(59,130,246,.07); }
    .dtext { font-size:0.83rem; white-space:pre-wrap; line-height:1.5; }
    .dfoot { display:flex; align-items:center; justify-content:space-between; margin-top:8px; padding-top:6px; border-top:1px solid var(--border); }
    .dbadges { display:flex; gap:5px; flex-wrap:wrap; }
    .badge { padding:1px 7px; border-radius:8px; font-size:0.66rem; font-weight:600; text-transform:uppercase; }
    .bh { background:rgba(239,68,68,.2); color:#fca5a5; }
    .bm { background:rgba(234,179,8,.2); color:#fde047; }
    .bl { background:rgba(34,197,94,.2); color:#86efac; }
    .bs { background:rgba(168,85,247,.2); color:#d8b4fe; }
    .copybtn { background:none; border:1px solid var(--border); color:var(--muted); padding:2px 8px; border-radius:4px; font-size:0.7rem; cursor:pointer; }
    .copybtn:hover { border-color:var(--accent); color:var(--accent); }
    .copybtn.ok { border-color:var(--green); color:var(--green); }

    /* Digest */
    .digest-body { background:rgba(0,0,0,.25); padding:14px; border-radius:6px; font-size:0.8rem; white-space:pre-wrap; max-height:400px; overflow-y:auto; font-family:monospace; color:#cbd5e1; }

    /* NFC */
    .nfc-card { background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(168,85,247,.08)); border:1px solid rgba(168,85,247,.3); border-radius:10px; padding:16px 18px; }
    .nfc-card .card-title { color:#d8b4fe; }
    .notion-link { display:inline-flex; align-items:center; gap:5px; background:rgba(59,130,246,.1); border:1px solid rgba(59,130,246,.3); color:var(--accent); padding:5px 12px; border-radius:6px; text-decoration:none; font-size:0.8rem; }

    .date-chips { display:flex; flex-wrap:wrap; gap:7px; }
    .dchip { background:var(--border); padding:3px 10px; border-radius:5px; font-size:0.8rem; font-family:monospace; }
    .empty { color:var(--muted); text-align:center; padding:30px; font-size:0.88rem; }
    .toast { position:fixed; bottom:20px; right:20px; background:var(--green); color:#022c22; padding:8px 18px; border-radius:8px; font-size:0.85rem; font-weight:600; display:none; z-index:9999; }
    #loading { text-align:center; padding:80px; color:var(--muted); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>AI News <span>Dashboard</span></h1>
    <div class="header-right">
      <span class="updated" id="updated-time">Loading...</span>
      <button class="btn" onclick="loadData()">Reload</button>
    </div>
  </header>

  <div id="loading">Loading...</div>
  <div id="content" style="display:none;">

    <!-- Page tabs -->
    <div class="page-tabs">
      <button class="ptab active" onclick="showPage('overview')">概要</button>
      <button class="ptab" onclick="showPage('categories')">カテゴリー別記事</button>
      <button class="ptab" onclick="showPage('drafts')">Xドラフト</button>
      <button class="ptab" onclick="showPage('digest')">ダイジェスト</button>
    </div>

    <!-- ===== PAGE: 概要 ===== -->
    <div class="page active" id="page-overview">
      <div class="stats" id="stats-row"></div>
      <div class="row2">
        <div class="card">
          <div class="card-title">🔥 主要トピック</div>
          <ul class="topics" id="topics-list"></ul>
        </div>
        <div class="card">
          <div class="card-title">📰 注目記事 Top 15</div>
          <ul class="arts" id="top-articles"></ul>
        </div>
      </div>
      <div class="row3">
        <div class="nfc-card">
          <div class="card-title">📡 NFC Business Intel</div>
          <p style="color:var(--muted);font-size:.83rem;margin-bottom:12px;">NFC記事は次回パイプライン実行時から蓄積されます</p>
          <a class="notion-link" href="https://notion.so" target="_blank">Notionで全記事を確認 →</a>
        </div>
        <div class="card">
          <div class="card-title">📅 データ保存日</div>
          <div class="date-chips" id="date-chips"></div>
        </div>
      </div>
    </div>

    <!-- ===== PAGE: カテゴリー別記事 ===== -->
    <div class="page" id="page-categories">
      <div class="card">
        <div class="card-title">📂 カテゴリー別 全記事</div>
        <div class="cat-tabs" id="cat-tabs"></div>
        <div id="cat-count" style="color:var(--muted);font-size:.78rem;margin-bottom:10px;"></div>
        <ul class="cat-articles" id="cat-articles"></ul>
      </div>
    </div>

    <!-- ===== PAGE: Xドラフト ===== -->
    <div class="page" id="page-drafts">
      <div class="card">
        <div class="card-title">✍️ X投稿ドラフト <span style="color:var(--muted);font-size:.75rem;">— クリックでコピー</span>
          <span id="draft-count" style="margin-left:auto;color:var(--muted);font-size:.75rem;"></span>
        </div>
        <div class="draft-tabs" id="draft-tabs"></div>
        <div class="draft-grid" id="drafts-grid"></div>
      </div>
    </div>

    <!-- ===== PAGE: ダイジェスト ===== -->
    <div class="page" id="page-digest">
      <div class="card">
        <div class="card-title">📋 最新ダイジェスト</div>
        <div class="digest-body" id="digest-body"></div>
      </div>
    </div>

  </div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
let dashData = {};
let allDrafts = [];
let articlesByCategory = {};
let currentCat = 'all';

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
}

async function loadData() {
  try {
    const resp = await fetch('data/dashboard.json?t=' + Date.now());
    if (!resp.ok) throw new Error();
    dashData = await resp.json();
    render(dashData);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#f87171">データなし — python scripts/run_pipeline.py を実行してください</p>';
  }
}

function scoreColor(s) {
  if(s>=10) return '#ef4444';
  if(s>=7)  return '#f97316';
  if(s>=5)  return '#eab308';
  return '#22c55e';
}

function render(d) {
  const upd = d.generated_at
    ? new Date(d.generated_at).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
    : '—';
  document.getElementById('updated-time').textContent = upd + ' 更新';

  const st = d.stats || {};
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="lbl">収集記事数</div><div class="val">${st.total_articles||0}</div><div class="sub">${(st.sources||[]).join(' · ')||'—'}</div></div>
    <div class="stat"><div class="lbl">Xドラフト</div><div class="val">${st.total_drafts||0}</div><div class="sub">ready to post</div></div>
    <div class="stat"><div class="lbl">カテゴリー数</div><div class="val">${Object.keys(d.articles_by_category||{}).length}</div><div class="sub">topics covered</div></div>
    <div class="stat"><div class="lbl">最新日付</div><div class="val" style="font-size:1.2rem;padding-top:4px">${d.latest_date||'—'}</div><div class="sub">latest run</div></div>
  `;

  // Topics
  const topics = d.topics || [];
  document.getElementById('topics-list').innerHTML = topics.length
    ? topics.map(t=>`<li><span>${t.topic} <span style="color:var(--muted);font-size:.75rem">(${t.count}件)</span></span><span class="t-score">▲${t.max_score.toFixed(1)}</span></li>`).join('')
    : '<li class="empty">—</li>';

  // Top articles
  const arts = d.top_articles || [];
  document.getElementById('top-articles').innerHTML = arts.length
    ? arts.map(a=>`<li>
        <div class="art-title"><span class="sdot" style="background:${scoreColor(a.score)}"></span>${a.url?`<a href="${a.url}" target="_blank">${esc(a.title||'')}</a>`:esc(a.title||'(タイトルなし)')}</div>
        <div class="art-meta">${a.score.toFixed(1)}pt · ${a.source}${a.topic?' · '+a.topic:''}</div>
        ${a.point?`<div class="art-summary">【要点】${esc(a.point)}</div>`:''}
      </li>`).join('')
    : '<li class="empty">—</li>';

  // Category articles
  articlesByCategory = d.articles_by_category || {};
  buildCatTabs();
  showCat('all');

  // Drafts
  allDrafts = d.x_drafts_preview || [];
  buildDraftTabs();
  renderDrafts('all');

  // Digest
  document.getElementById('digest-body').textContent = d.digest_preview || '(なし)';

  // Dates
  const dates = d.available_dates || [];
  document.getElementById('date-chips').innerHTML = dates.slice().reverse().map(d=>`<div class="dchip">${d}</div>`).join('') || '<span style="color:var(--muted);font-size:.82rem">—</span>';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ---- Category ---- */
function buildCatTabs() {
  const cats = Object.keys(articlesByCategory);
  const totalAll = Object.values(articlesByCategory).reduce((a,b)=>a+b.length,0);
  let html = `<button class="ctab active" onclick="showCat('all')">すべて(${totalAll})</button>`;
  cats.forEach(c => {
    html += `<button class="ctab" onclick="showCat('${esc(c)}')">${esc(c)}(${articlesByCategory[c].length})</button>`;
  });
  document.getElementById('cat-tabs').innerHTML = html;
}

function showCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.ctab').forEach(t => {
    const isCat = cat==='all' ? t.textContent.startsWith('すべて') : t.textContent.startsWith(cat+'(');
    t.classList.toggle('active', isCat);
  });

  let articles = [];
  if(cat === 'all') {
    Object.entries(articlesByCategory).forEach(([c, arr]) => {
      arr.forEach(a => articles.push({...a, _cat: c}));
    });
    articles.sort((a,b) => b.score - a.score);
  } else {
    articles = (articlesByCategory[cat]||[]).map(a=>({...a,_cat:cat}));
  }

  document.getElementById('cat-count').textContent = `${articles.length} 件`;
  document.getElementById('cat-articles').innerHTML = articles.length
    ? articles.map(a=>`
      <li class="cat-article">
        <div class="ca-header">
          <div class="ca-score">${a.score.toFixed(1)}</div>
          <div style="flex:1">
            ${a.point?`<div class="ca-point">${esc(a.point)}</div>`:''}
            <div class="ca-title">${a.url?`<a href="${a.url}" target="_blank">${esc(a.title||'(タイトルなし)')}</a>`:esc(a.title||'(タイトルなし)')}</div>
            <div class="ca-meta">${esc(a._cat)} · ${esc(a.source)}</div>
            ${a.summary_ja?`<div class="ca-summary">${esc(a.summary_ja)}</div>`:''}
          </div>
        </div>
      </li>`).join('')
    : '<li class="empty">この カテゴリーに記事はありません</li>';
}

/* ---- Drafts ---- */
function buildDraftTabs() {
  const styles = ['all', ...new Set(allDrafts.map(d=>d.style).filter(Boolean))];
  document.getElementById('draft-tabs').innerHTML = styles.map(s=>
    `<button class="dtab${s==='all'?' active':''}" onclick="filterDrafts('${s}')">${s==='all'?'すべて':s}</button>`
  ).join('');
  document.getElementById('draft-count').textContent = allDrafts.length + '本';
}

function filterDrafts(style) {
  document.querySelectorAll('.dtab').forEach(t => {
    t.classList.toggle('active', t.textContent===(style==='all'?'すべて':style));
  });
  renderDrafts(style);
}

function renderDrafts(style) {
  const filtered = style==='all' ? allDrafts : allDrafts.filter(d=>d.style===style);
  document.getElementById('draft-count').textContent = `${filtered.length}/${allDrafts.length}本`;
  document.getElementById('drafts-grid').innerHTML = filtered.map((d,i)=>{
    const urg = d.urgency||'low';
    const bc = urg==='high'?'bh':urg==='medium'?'bm':'bl';
    const txt = d.text||'';
    return `<div class="dcard">
      <div class="dtext">${esc(txt)}</div>
      <div class="dfoot">
        <div class="dbadges">
          <span class="badge bs">${esc(d.style||'')}</span>
          <span class="badge ${bc}">${urg}</span>
          ${d.topic?`<span class="badge" style="background:rgba(100,100,100,.3);color:var(--muted)">${esc(d.topic)}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:7px">
          <span style="color:var(--muted);font-size:.7rem">${d.char_count||txt.length}字</span>
          <button class="copybtn" id="cb${i}" onclick="copyDraft(${i},'${txt.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n')}')">Copy</button>
        </div>
      </div>
    </div>`;
  }).join('') || '<div class="empty">ドラフトなし</div>';
}

function copyDraft(i, text) {
  navigator.clipboard.writeText(text.replace(/\\n/g,'\n')).then(()=>{
    const b = document.getElementById('cb'+i);
    b.textContent='Copied!'; b.classList.add('ok');
    setTimeout(()=>{ b.textContent='Copy'; b.classList.remove('ok'); },2000);
    const t = document.getElementById('toast');
    t.style.display='block';
    setTimeout(()=>{ t.style.display='none'; },1800);
  });
}

loadData();
</script>
</body>
</html>
