<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI News Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #243044;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --orange: #f97316;
      --purple: #a855f7;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    .container { max-width: 1280px; margin: 0 auto; padding: 20px 24px; }

    /* Header */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    header h1 span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .updated { color: var(--muted); font-size: 0.8rem; }
    .btn { background: var(--accent); color: white; border: none; padding: 6px 14px;
           border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-sm { padding: 3px 10px; font-size: 0.75rem; }

    /* Stats row */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .stat {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px;
    }
    .stat .lbl { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat .val { font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1.1; margin: 2px 0; }
    .stat .sub { color: var(--muted); font-size: 0.78rem; }

    /* 2-col grid */
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
    .row.full { grid-template-columns: 1fr; }
    .row.col3 { grid-template-columns: 2fr 1fr; }
    @media (max-width: 860px) { .stats { grid-template-columns: 2fr 2fr; } .row, .row.col3 { grid-template-columns: 1fr; } }

    /* Card */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px 20px; overflow: hidden;
    }
    .card-title {
      font-size: 0.95rem; font-weight: 600; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title .ico { font-size: 1.1rem; }

    /* Topic list */
    .topics { list-style: none; }
    .topics li {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem;
    }
    .topics li:last-child { border-bottom: none; }
    .t-name { font-weight: 500; }
    .t-cnt { color: var(--muted); font-size: 0.78rem; margin-left: 6px; }
    .t-score { background: rgba(59,130,246,0.15); color: var(--accent);
               padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }

    /* Article list */
    .articles { list-style: none; }
    .articles li { padding: 9px 0; border-bottom: 1px solid var(--border); }
    .articles li:last-child { border-bottom: none; }
    .art-title { font-size: 0.88rem; font-weight: 500; }
    .art-title a { color: var(--text); text-decoration: none; }
    .art-title a:hover { color: var(--accent); text-decoration: underline; }
    .art-meta { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }
    .score-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 5px; vertical-align: middle;
    }

    /* Draft tabs */
    .draft-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .tab {
      background: var(--border); color: var(--muted); border: none; padding: 4px 12px;
      border-radius: 20px; font-size: 0.78rem; cursor: pointer; transition: all 0.2s;
    }
    .tab.active { background: var(--accent); color: white; }
    .tab:hover:not(.active) { background: var(--card2); color: var(--text); }

    /* Draft cards */
    .draft-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
    .draft-card {
      background: var(--card2); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px; cursor: pointer; transition: all 0.2s; border-left: 3px solid var(--accent);
    }
    .draft-card:hover { border-color: var(--accent); background: rgba(59,130,246,0.08); }
    .draft-text { font-size: 0.85rem; white-space: pre-wrap; line-height: 1.5; color: var(--text); }
    .draft-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border);
    }
    .draft-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      padding: 2px 8px; border-radius: 10px; font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.03em;
    }
    .badge-high { background: rgba(239,68,68,0.2); color: #fca5a5; }
    .badge-medium { background: rgba(234,179,8,0.2); color: #fde047; }
    .badge-low { background: rgba(34,197,94,0.2); color: #86efac; }
    .badge-style { background: rgba(168,85,247,0.2); color: #d8b4fe; }
    .draft-chars { color: var(--muted); font-size: 0.72rem; }
    .copy-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 3px 8px; border-radius: 4px; font-size: 0.72rem; cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--green); color: var(--green); }

    /* Digest */
    .digest-body {
      background: rgba(0,0,0,0.25); padding: 14px; border-radius: 6px;
      font-size: 0.82rem; white-space: pre-wrap; max-height: 320px;
      overflow-y: auto; font-family: 'Courier New', monospace; color: #cbd5e1;
    }

    /* NFC card */
    .nfc-banner {
      background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(168,85,247,0.1));
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 10px; padding: 18px 20px;
    }
    .nfc-banner .card-title { color: #d8b4fe; }
    .nfc-items { list-style: none; }
    .nfc-items li { padding: 7px 0; border-bottom: 1px solid rgba(168,85,247,0.15); font-size: 0.88rem; }
    .nfc-items li:last-child { border-bottom: none; }
    .nfc-tag { background: rgba(168,85,247,0.2); color: #d8b4fe; padding: 1px 7px; border-radius: 8px; font-size: 0.72rem; margin-right: 6px; }

    /* Dates */
    .date-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .date-chip { background: var(--border); padding: 4px 12px; border-radius: 6px; font-size: 0.82rem; font-family: monospace; }

    /* Notion link */
    .notion-link {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3);
      color: var(--accent); padding: 6px 14px; border-radius: 6px; text-decoration: none;
      font-size: 0.82rem; transition: all 0.2s;
    }
    .notion-link:hover { background: rgba(59,130,246,0.2); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #022c22;
      padding: 10px 20px; border-radius: 8px; font-size: 0.88rem; font-weight: 600;
      display: none; z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #loading { text-align: center; padding: 80px; color: var(--muted); font-size: 1rem; }
    .empty { color: var(--muted); text-align: center; padding: 30px; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>AI News <span>Dashboard</span></h1>
    <div class="header-right">
      <span class="updated" id="updated-time">Loading...</span>
      <button class="btn btn-sm" onclick="loadData()">Reload</button>
    </div>
  </header>

  <div id="loading">Loading dashboard data...</div>
  <div id="content" style="display:none;">

    <!-- Stats -->
    <div class="stats" id="stats-row"></div>

    <!-- Topics + Articles -->
    <div class="row">
      <div class="card">
        <div class="card-title"><span class="ico">🔥</span> 主要トピック</div>
        <ul class="topics" id="topics-list"></ul>
      </div>
      <div class="card">
        <div class="card-title"><span class="ico">📰</span> 注目記事 Top 15</div>
        <ul class="articles" id="articles-list"></ul>
      </div>
    </div>

    <!-- X Drafts (full width) -->
    <div class="card row full" style="margin-bottom:18px;">
      <div class="card-title">
        <span class="ico">✍️</span> X投稿ドラフト
        <span style="color:var(--muted);font-size:0.78rem;">— クリックでコピー</span>
        <span id="draft-count" style="margin-left:auto;color:var(--muted);font-size:0.78rem;"></span>
      </div>
      <div class="draft-tabs" id="draft-tabs"></div>
      <div class="draft-grid" id="drafts-grid"></div>
    </div>

    <!-- Digest + NFC + Dates -->
    <div class="row col3">
      <div class="card">
        <div class="card-title"><span class="ico">📋</span> 最新ダイジェスト</div>
        <div class="digest-body" id="digest-body"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:18px;">
        <div class="nfc-banner">
          <div class="card-title"><span class="ico">📡</span> NFC Business Intel</div>
          <ul class="nfc-items" id="nfc-list">
            <li style="color:var(--muted);font-size:0.85rem;">NFC記事は次回パイプライン実行時から蓄積されます</li>
          </ul>
          <div style="margin-top:12px;">
            <a class="notion-link" href="https://notion.so" target="_blank">
              Notionで確認 →
            </a>
          </div>
        </div>
        <div class="card">
          <div class="card-title"><span class="ico">📅</span> データ保存日</div>
          <div class="date-chips" id="date-chips"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
const DATA_URL = 'data/dashboard.json';
let allDrafts = [];
let currentStyle = 'all';

async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('Not found');
    const data = await resp.json();
    render(data);
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#f87171;">データが見つかりません</p>' +
      '<p style="margin-top:8px;font-size:0.85rem;color:#94a3b8;">先にパイプラインを実行してください:</p>' +
      '<code style="background:#1e293b;padding:8px 16px;border-radius:6px;display:inline-block;margin-top:8px;font-size:0.82rem;">' +
      'python scripts/run_pipeline.py</code>';
  }
}

function scoreColor(s) {
  if (s >= 10) return '#ef4444';
  if (s >= 7)  return '#f97316';
  if (s >= 5)  return '#eab308';
  return '#22c55e';
}

function render(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  const updated = data.generated_at
    ? new Date(data.generated_at).toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
    : 'N/A';
  document.getElementById('updated-time').textContent = updated + ' 更新';

  /* Stats */
  const st = data.stats || {};
  document.getElementById('stats-row').innerHTML = `
    <div class="stat">
      <div class="lbl">収集記事数</div>
      <div class="val">${st.total_articles || 0}</div>
      <div class="sub">${(st.sources || []).join(' · ') || '—'}</div>
    </div>
    <div class="stat">
      <div class="lbl">Xドラフト</div>
      <div class="val">${st.total_drafts || 0}</div>
      <div class="sub">ready to post</div>
    </div>
    <div class="stat">
      <div class="lbl">保存日数</div>
      <div class="val">${st.total_dates || 0}</div>
      <div class="sub">days of data</div>
    </div>
    <div class="stat">
      <div class="lbl">最新日付</div>
      <div class="val" style="font-size:1.3rem;padding-top:4px;">${data.latest_date || '—'}</div>
      <div class="sub">latest collection</div>
    </div>
  `;

  /* Topics */
  const topics = data.topics || [];
  document.getElementById('topics-list').innerHTML = topics.length
    ? topics.map(t => `
        <li>
          <span class="t-name">${t.topic}<span class="t-cnt">(${t.count}件)</span></span>
          <span class="t-score">▲ ${t.max_score.toFixed(1)}</span>
        </li>`).join('')
    : '<li class="empty">No topics yet</li>';

  /* Articles */
  const articles = data.top_articles || [];
  document.getElementById('articles-list').innerHTML = articles.length
    ? articles.map(a => {
        const c = scoreColor(a.score);
        return `<li>
          <div class="art-title">
            <span class="score-dot" style="background:${c}"></span>
            ${a.url ? `<a href="${a.url}" target="_blank">${a.title || '(タイトルなし)'}</a>`
                    : (a.title || '(タイトルなし)')}
          </div>
          <div class="art-meta">${a.score.toFixed(1)} pt &nbsp;·&nbsp; ${a.source}${a.topic ? ' &nbsp;·&nbsp; ' + a.topic : ''}</div>
        </li>`;
      }).join('')
    : '<li class="empty">No articles yet</li>';

  /* Drafts */
  allDrafts = data.x_drafts_preview || [];
  buildDraftTabs();
  renderDrafts('all');

  /* Digest */
  document.getElementById('digest-body').textContent =
    data.digest_preview || '(ダイジェストなし — パイプラインを実行してください)';

  /* Dates */
  const dates = data.available_dates || [];
  document.getElementById('date-chips').innerHTML = dates.length
    ? dates.slice().reverse().map(d => `<div class="date-chip">${d}</div>`).join('')
    : '<span style="color:var(--muted);font-size:0.85rem;">No data yet</span>';
}

function buildDraftTabs() {
  const styles = ['all', ...new Set(allDrafts.map(d => d.style).filter(Boolean))];
  document.getElementById('draft-tabs').innerHTML = styles.map(s => `
    <button class="tab${s === 'all' ? ' active' : ''}" onclick="filterDrafts('${s}')">${s === 'all' ? 'すべて' : s}</button>
  `).join('');
  document.getElementById('draft-count').textContent = `${allDrafts.length}本`;
}

function filterDrafts(style) {
  currentStyle = style;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.textContent === (style === 'all' ? 'すべて' : style));
  });
  renderDrafts(style);
}

function renderDrafts(style) {
  const filtered = style === 'all' ? allDrafts : allDrafts.filter(d => d.style === style);
  document.getElementById('draft-count').textContent = `${filtered.length} / ${allDrafts.length}本`;

  if (!filtered.length) {
    document.getElementById('drafts-grid').innerHTML = '<div class="empty">No drafts for this style</div>';
    return;
  }

  document.getElementById('drafts-grid').innerHTML = filtered.map((d, i) => {
    const urg = d.urgency || 'low';
    const urgClass = 'badge-' + urg;
    const text = d.text || '';
    const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `
      <div class="draft-card" id="dcard-${i}">
        <div class="draft-text">${escaped}</div>
        <div class="draft-footer">
          <div class="draft-badges">
            <span class="badge badge-style">${d.style || ''}</span>
            <span class="badge ${urgClass}">${urg}</span>
            ${d.topic ? `<span class="badge" style="background:rgba(100,100,100,0.3);color:var(--muted);">${d.topic}</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="draft-chars">${d.char_count || text.length}文字</span>
            <button class="copy-btn" id="cbtn-${i}" onclick="copyDraft(event,${i},'${text.replace(/'/g,"\\'")}')">Copy</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function copyDraft(e, idx, text) {
  e.stopPropagation();
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('cbtn-' + idx);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 1800);
  });
}

loadData();
</script>
</body>
</html>
