name: AI News Daily Pipeline

on:
  schedule:
    # 毎朝 22:00 UTC = 日本時間 07:00 JST
    - cron: '0 22 * * *'
  workflow_dispatch:
    # GitHub上から手動実行も可能

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_AI_DB_ID: ${{ secrets.NOTION_AI_DB_ID }}
          NOTION_NFC_DB_ID: ${{ secrets.NOTION_NFC_DB_ID }}
          NOTION_AI_PARENT_PAGE_ID: ${{ secrets.NOTION_AI_PARENT_PAGE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PYTHONIOENCODING: utf-8
        run: |
          cd scripts
          python run_pipeline.py

      - name: Commit dashboard data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/dashboard.json outputs/latest/ || true
          git diff --staged --quiet || git commit -m "chore: dashboard update $(date +'%Y-%m-%d')"
          git push origin main || true

      - name: Upload outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs-${{ github.run_number }}
          path: |
            outputs/latest/
          retention-days: 7
