name: AI News Daily Pipeline

on:
  schedule:
    # 毎朝 22:00 UTC = 日本時間 07:00 JST
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      step:
        description: "実行するステップ（空白で全ステップ）"
        required: false
        default: ""

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_AI_DB_ID: ${{ secrets.NOTION_AI_DB_ID }}
          NOTION_NFC_DB_ID: ${{ secrets.NOTION_NFC_DB_ID }}
          NOTION_AI_PARENT_PAGE_ID: ${{ secrets.NOTION_AI_PARENT_PAGE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          PRODUCTHUNT_ACCESS_TOKEN: ${{ secrets.PRODUCTHUNT_ACCESS_TOKEN }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          if [ -n "${{ github.event.inputs.step }}" ]; then
            python scripts/run_pipeline.py --step ${{ github.event.inputs.step }}
          else
            python scripts/run_pipeline.py
          fi

      - name: Commit dashboard data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/dashboard.json outputs/latest/ || true
          git diff --staged --quiet || git commit -m "chore: dashboard update $(date +'%Y-%m-%d')"
          git push origin main || true

      - name: Upload outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs-${{ github.run_number }}
          path: |
            outputs/latest/
            outputs/daily/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import os, requests
          token = os.getenv('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.getenv('TELEGRAM_CHAT_ID', '')
          if token and chat_id:
              requests.post(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  json={'chat_id': chat_id, 'text': '❌ AI News Pipeline failed. Check GitHub Actions.'}
              )
          "
